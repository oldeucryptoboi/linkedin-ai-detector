<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: rounded square -->
  <rect width="128" height="128" rx="24" fill="#0a66c2"/>

  <!-- Magnifying glass circle -->
  <circle cx="56" cy="52" r="28" fill="none" stroke="#fff" stroke-width="6" opacity="0.9"/>

  <!-- Magnifying glass handle -->
  <line x1="76" y1="72" x2="100" y2="96" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

  <!-- "AI" text inside lens -->
  <text x="56" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="28" fill="#fff" letter-spacing="-1">AI</text>

  <!-- Small detection dot (red) -->
  <circle cx="74" cy="36" r="8" fill="#ef4444"/>

  <!-- Checkmark/alert in dot -->
  <text x="74" y="41" text-anchor="middle" font-family="Arial" font-weight="700" font-size="12" fill="#fff">!</text>
</svg>
